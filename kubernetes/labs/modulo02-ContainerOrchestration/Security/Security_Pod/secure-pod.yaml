apiVersion: v1
kind: Pod
metadata:
  labels:
    app: secure-pod
  name: secure-pod
spec:
  securityContext:
    fsGroup: 1000
  containers:
    - name: secure-pod
      image: busybox
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true # Garantindo que o sistema de arquivos do contêiner seja somente leitura
        capabilities:
          drop: ["ALL"]
      resources:
        {
          limits: { cpu: "100m", memory: "128Mi" },
          requests: { cpu: "50m", memory: "64Mi" },
        }
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: shared-data
          mountPath: /data
  volumes:
    - name: shared-data
      emptyDir: {}
