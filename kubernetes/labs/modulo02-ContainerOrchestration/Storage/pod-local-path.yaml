apiVersion: v1
kind: Pod
metadata:
  name: pv-localpath
spec:
  containers:
    - name: pod-localpath
      image: nginx
      volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: my-volume
      resources: {}
  volumes:
    - name: my-volume
      persistentVolumeClaim:
        claimName: local-path-pvc
