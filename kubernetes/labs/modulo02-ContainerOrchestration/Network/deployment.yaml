apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx-clusterip
  name: nginx-clusterip
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-clusterip
  template:
    metadata:
      labels:
        app: nginx-clusterip
    spec:
      containers:
        - image: nginx
          name: nginx
