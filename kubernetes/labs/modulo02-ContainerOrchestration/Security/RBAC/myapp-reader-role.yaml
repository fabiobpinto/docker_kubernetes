apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: myapp-reader
  namespace: myapp
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - watch
      - list
      - create
  - apiGroups:
      - ""
    resources:
      - pods
      - services
    verbs:
      - get
      - list

# k create role myapp-reader --verb=get,watch,list --resource=pods,services --namespace=myapp  --dry-run=client -o yaml > myapp-reader-role.yaml
