apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-admin
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
      - namespaces
    verbs:
      - get
      - list
      - create
      - delete
      - update
  - apiGroups:
      - "storage.k8s.io"
    resources:
      - storageclasses
    verbs:
      - get
      - list
      - create
      - delete
      - update

# k create clusterrole node-admin --verb=get,watch,list,create,delete,update --resource=nodes,namespaces --dry-run=client -o yaml > myapp-node-admin.yaml
