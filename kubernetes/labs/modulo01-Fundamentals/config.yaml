kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  - containerPort: 80
    hostPort: 80
    listenAddress: "0.0.0.0"
    protocol: TCP
  - containerPort: 443
    hostPort: 443
    listenAddress: "0.0.0.0"
    protocol: TCP
  - containerPort: 8080
    hostPort: 8080
    listenAddress: "0.0.0.0"
    protocol: TCP
  - containerPort: 30090  # Prometheus
    hostPort: 9090
    protocol: TCP
    listenAddress: "0.0.0.0"
  - containerPort: 30080  # Grafana
    hostPort: 3000
    protocol: TCP
    listenAddress: "0.0.0.0"
  - containerPort: 30070  #Alertmanager
    hostPort: 9093
    protocol: TCP
    listenAddress: "0.0.0.0"
- role: worker
- role: worker
