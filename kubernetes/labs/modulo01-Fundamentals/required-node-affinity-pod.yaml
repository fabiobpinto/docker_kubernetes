apiVersion: v1
kind: Pod
metadata:
  name: required-node-affinity-pod
spec:
  containers:
    - image: nginx
      name: ngginx
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
  # affinity:
  #   nodeAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       nodeSelectorTerms:
  #         - matchExpressions:
  #             - key: disktype
  #               operator: In
  #               values:
  #                 - ssd # Tag que foi adicionada ao nó acme-worker.

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 10 # Peso para a preferência. O valor pode ser entre 1 e 100.
          preference:
            matchExpressions:
              - key: disktype
                operator: In
                values:
                  - ssd # Tag que foi adicionada ao nó acme-worker.
        - weight: 20 # Peso para a preferência. O valor pode ser entre 1 e 100.
          preference:
            matchExpressions:
              - key: disktype
                operator: In
                values:
                  - hdd # Tag que foi adicionada ao nó acme-worker.